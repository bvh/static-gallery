<!DOCTYPE html>
<html lang="{{ site.language }}">
<head>
    <meta charset="utf-8">
    <title>{{ page.title }} &emdash; {{ site.title }}</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header>
        <h1>{{ page.title }}</h1>
    </header>
    <main>
        {{ page.content }}
        {% if page.dirs %}
        <ul class="dirs">
            {% for dir in page.dirs %}
            <li><a href="{{ dir.url }}">{{ dir.name }}</a></li>
            {% endfor %}
        </ul>
        {% endif %}
        {% if page.pages %}
        <ul class="pages">
            {% for p in page.pages %}
            <li><a href="{{ p.url }}">{{ p.name }}</a></li>
            {% endfor %}
        </ul>
        {% endif %}
    </main>
</body>
</html>
