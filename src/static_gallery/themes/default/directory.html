<!DOCTYPE html>
<html lang="{{ site.language }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="generator" content="{{ generator.name }} {{ generator.version }}">
    <title>{{ page.title }} &mdash; {{ site.title }}</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header>
        <h1>{{ page.title }}</h1>
    </header>
    <main>
        {{ page.content }}
        {% if page.dirs %}
        <ul class="dirs">
            {% for dir in page.dirs %}
            <li><a href="{{ dir.url }}">{{ dir.name }}</a></li>
            {% endfor %}
        </ul>
        {% endif %}
        {% if page.pages %}
        <ul class="pages">
            {% for p in page.pages %}
            <li><a href="{{ p.url }}">{{ p.name }}</a></li>
            {% endfor %}
        </ul>
        {% endif %}
    </main>
    <footer>
        <p>Generated by <a href="https://pypi.org/project/{{ generator.package }}/">{{ generator.name }}</a></p>
    </footer>
</body>
</html>
