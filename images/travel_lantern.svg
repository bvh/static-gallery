<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1280" viewBox="0 0 1920 1280">
  <rect width="1920" height="1280" fill="#2a4a2a"/>
  <!-- Dense foliage background -->
  <circle cx="300" cy="200" r="250" fill="#1a3a1a"/>
  <circle cx="700" cy="150" r="280" fill="#1a3a1a"/>
  <circle cx="1100" cy="180" r="260" fill="#1a3a1a"/>
  <circle cx="1500" cy="200" r="250" fill="#1a3a1a"/>
  <circle cx="500" cy="400" r="200" fill="#254525"/>
  <circle cx="1300" cy="380" r="220" fill="#254525"/>
  <!-- Moss-covered ground -->
  <rect x="0" y="800" width="1920" height="480" fill="#3a5a2a"/>
  <!-- Stone path -->
  <ellipse cx="960" cy="900" rx="180" ry="40" fill="#8a8a7a" stroke="#6a6a5a" stroke-width="2"/>
  <ellipse cx="800" cy="1000" rx="150" ry="35" fill="#888877" stroke="#6a6a5a" stroke-width="2"/>
  <ellipse cx="1100" cy="1050" rx="160" ry="38" fill="#8a8a7a" stroke="#6a6a5a" stroke-width="2"/>
  <ellipse cx="900" cy="1150" rx="170" ry="40" fill="#888877" stroke="#6a6a5a" stroke-width="2"/>
  <!-- Stone lantern (kasuga-doro style) -->
  <!-- Base -->
  <rect x="890" y="750" width="100" height="30" fill="#999" stroke="#777" stroke-width="2"/>
  <!-- Shaft -->
  <rect x="920" y="550" width="40" height="200" fill="#aaa" stroke="#777" stroke-width="2"/>
  <!-- Fire box -->
  <rect x="890" y="470" width="100" height="80" fill="#bbb" stroke="#777" stroke-width="2"/>
  <!-- Window openings in fire box -->
  <rect x="910" y="485" width="25" height="50" fill="#4a3a20" rx="12"/>
  <rect x="945" y="485" width="25" height="50" fill="#4a3a20" rx="12"/>
  <!-- Roof -->
  <polygon points="870,470 940,380 1010,470" fill="#999" stroke="#777" stroke-width="2"/>
  <!-- Finial -->
  <circle cx="940" cy="370" r="12" fill="#aaa" stroke="#777" stroke-width="2"/>
  <!-- Moss on lantern -->
  <ellipse cx="900" cy="475" rx="15" ry="8" fill="#5a7a3a" opacity="0.5"/>
  <ellipse cx="970" cy="395" rx="12" ry="6" fill="#5a7a3a" opacity="0.5"/>
  <!-- Low plants -->
