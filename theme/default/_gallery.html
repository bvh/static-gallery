<!DOCTYPE html>
<html lang="{{ site.language }}">
<head>
    <meta charset="utf-8">
    <title>{{ page.title }} &emdash; {{ site.title }}</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header>
        <h1>{{ page.title }}</h1>
    </header>
    <main>
        {{ page.content }}
        {% if page.images %}
        <div class="gallery">
            {% for img in page.images %}
            <figure>
                <a href="{{ img.url }}"><img src="{{ img.url }}" alt="{{ img.name }}"></a>
            </figure>
            {% endfor %}
        </div>
        {% endif %}
    </main>
</body>
</html>
